
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mtaiirus - Online Learning Platform</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #F5F2EB;
  --bg2: #ECEAE2;
  --ink: #1A1814;
  --ink2: #6B6760;
  --ink3: #B0ADA7;
  --accent: #D4540E;
  --accentl: #F0A87A;
  --accentb: rgba(212,84,14,.08);
  --green: #2D6A3F;
  --greenl: #E4F0E8;
  --card: #FFFDFB;
  --border: rgba(26,24,20,.1);
  --borderh: rgba(26,24,20,.2);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

/* HEADER */
header {
  background: var(--card);
  color: var(--ink);
  height: 72px;
  display: flex;
  align-items: center;
  padding: 0 40px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 0 var(--border);
  gap: 32px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'Syne', sans-serif;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -1px;
  color: var(--ink);
  white-space: nowrap;
}

.logo-img {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  object-fit: cover;
}

.search {
  flex: 1;
  max-width: 480px;
}

.search input {
  width: 100%;
  padding: 12px 20px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: all 0.2s ease;
}

.search input:focus {
  border-color: var(--accent);
  background: var(--card);
  box-shadow: 0 0 0 4px var(--accentb);
}

.header-stats {
  color: var(--ink2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  margin-left: auto;
  text-transform: uppercase;
}

/* TABS */
.tabs {
  display: flex;
  gap: 8px;
  margin: 32px 0;
  background: var(--bg2);
  padding: 6px;
  border-radius: 14px;
  width: fit-content;
  border: 1px solid var(--border);
}

.tab-btn {
  padding: 10px 24px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--ink2);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.2s ease;
  white-space: nowrap;
}

.tab-btn:hover {
  color: var(--ink);
}

.tab-btn.active {
  background: var(--card);
  color: var(--accent);
  box-shadow: 0 4px 12px rgba(26,24,20,.05);
}

.tab-count {
  background: var(--accentb);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  margin-left: 8px;
}

.tab-btn.active .tab-count {
  background: var(--accent);
  color: var(--bg);
}

/* MAIN */
main {
  padding: 0 40px 60px;
  max-width: 1400px;
  margin: 0 auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 32px;
}

/* CARD */
.card {
  background: var(--card);
  border-radius: 20px;
  border: 1px solid var(--border);
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 60px rgba(26,24,20, 0.12);
  border-color: var(--borderh);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.card:hover img {
  transform: scale(1.04);
}

.content {
  padding: 24px;
}

.title {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  line-height: 1.3;
  color: var(--ink);
  letter-spacing: -0.5px;
}

.actions {
  display: flex;
  gap: 12px;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

button:active {
  transform: scale(0.97);
}

.study {
  background: var(--ink);
  color: var(--bg);
}

.study:hover {
  background: var(--accent);
}

.enroll {
  background: var(--accentb);
  border: 1.5px solid rgba(212,84,14, .25);
  color: var(--accent);
}

.enroll:hover {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

.unenroll {
  background: transparent;
  color: var(--ink2);
  border: 1px solid var(--border);
}

.unenroll:hover {
  background: #fee2e2;
  color: #dc2626;
  border-color: #fca5a5;
}

.wrap {
  position: relative;
  overflow: hidden;
}

.badge {
  position: absolute;
  top: 16px;
  right: 16px;
  background: var(--greenl);
  color: var(--green);
  padding: 6px 12px;
  font-size: 10px;
  border-radius: 100px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  box-shadow: 0 4px 12px rgba(45,106,63, 0.15);
}

/* LOADING & STATES */
.loading-container {
  text-align: center;
  padding: 100px 20px;
  grid-column: 1 / -1;
  color: var(--ink2);
}

.spinner {
  border: 3px solid var(--border);
  border-top: 3px solid var(--accent);
  border-radius: 50%;
  width: 32px;
  height: 32px;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.error-state {
  text-align: center;
  padding: 60px;
  background: var(--card);
  border: 1px solid #fca5a5;
  border-radius: 20px;
  margin: 40px 0;
  color: #b91c1c;
  grid-column: 1 / -1;
}

.error-state button {
  margin-top: 20px;
  padding: 12px 32px;
  background: #dc2626;
  color: white;
  border-radius: 8px;
  width: auto;
}

.empty-state {
  text-align: center;
  padding: 100px 20px;
  color: var(--ink3);
  grid-column: 1 / -1;
}

.empty-state .icon {
  font-size: 56px;
  margin-bottom: 24px;
  filter: grayscale(1);
  opacity: 0.5;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--ink);
  color: var(--bg);
  padding: 16px 28px;
  border-radius: 12px;
  z-index: 2000;
  animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28), slideOut 0.4s 2.6s forwards;
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

@keyframes slideIn {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

@keyframes slideOut {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(40px); opacity: 0; }
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
    gap: 20px;
  }
  
  header {
    padding: 0 20px;
    height: auto;
    flex-direction: column;
    padding-bottom: 20px;
    gap: 16px;
  }

  .search {
    width: 100%;
    max-width: none;
  }
  
  .logo {
    margin-top: 16px;
    font-size: 20px;
  }
  
  .tabs {
    width: 100%;
    overflow-x: auto;
  }
  
  .tab-btn {
    flex: 1;
    text-align: center;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg" alt="Mtaiirus Logo" class="logo-img">
    Mtaiirus
  </div>
  <div class="search">
    <input id="searchInput" placeholder="🔍 Search batches...">
  </div>
  <div class="header-stats" id="headerStats"></div>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('all')">
      All Batches <span class="tab-count" id="allCount">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('enrolled')">
      Enrolled <span class="tab-count" id="enrolledCount">0</span>
    </button>
  </div>

  <div id="grid" class="grid">
    <div class="loading-container">
      <div class="spinner"></div>
      <p>Loading amazing courses for you...</p>
    </div>
  </div>
</main>

<script>
// State management - Store only IDs in localStorage
let batches = [];
let enrolledIds = []; // Array of IDs only
let loading = false;
let currentTab = 'all';

// Load enrolled from localStorage (stored as simple array of IDs)
function loadEnrolled() {
  try {
    const data = localStorage.getItem("mtaiirus_enrolled");
    if (data) {
      enrolledIds = JSON.parse(data);
    }
  } catch (e) {
    console.error("Failed to load enrolled:", e);
    enrolledIds = [];
  }
}

// Save enrolled to localStorage (only IDs array)
function saveEnrolled() {
  try {
    localStorage.setItem("mtaiirus_enrolled", JSON.stringify(enrolledIds));
  } catch (e) {
    console.error("Failed to save enrolled:", e);
  }
}

// Check enrollment
function isEnrolled(id) {
  return enrolledIds.includes(String(id));
}

// Enroll
function enroll(id) {
  const stringId = String(id);
  if (!isEnrolled(stringId)) {
    enrolledIds.push(stringId);
    saveEnrolled();
    renderBatches();
    updateStats();
    updateTabCounts();
    showToast("✅ Successfully enrolled!");
  }
}

// Unenroll (one click - no confirmation)
function unenroll(id) {
  const stringId = String(id);
  enrolledIds = enrolledIds.filter(eid => eid !== stringId);
  saveEnrolled();
  renderBatches();
  updateStats();
  updateTabCounts();
  showToast("Unenrolled from batch");
}

// Study action
function study(id) {
  if (!isEnrolled(id)) {
    showToast("Please enroll first to start learning!");
    return;
  }
  // Open batch page
  window.location.href = "subject.html?id=" + id;
}

// Switch tab
function switchTab(tab) {
  currentTab = tab;
  
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  
  renderBatches();
}

// Update tab counts
function updateTabCounts() {
  document.getElementById('allCount').textContent = batches.length;
  document.getElementById('enrolledCount').textContent = enrolledIds.length;
}

// Create card HTML
function createCard(batch) {
  const id = String(batch.id);
  const enrolled_status = isEnrolled(id);
  
  return `
    <div class="card" style="animation-delay: ${Math.random() * 0.3}s">
      <div class="wrap">
        <img src="${batch.thumbnail || 'https://via.placeholder.com/400x200?text=Course'}" 
             alt="${batch.title}"
             onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
        ${enrolled_status ? '<div class="badge">✓ Enrolled</div>' : ''}
      </div>
      
      <div class="content">
        <div class="title">${batch.title}</div>
        
        <div class="actions">
          <button class="study" onclick="study('${id}')">
            ${enrolled_status ? 'Study Now' : 'Preview'}
          </button>
          
          ${enrolled_status
            ? `<button class="unenroll" onclick="unenroll('${id}')">Unenroll</button>`
            : `<button class="enroll" onclick="enroll('${id}')">Enroll</button>`
          }
        </div>
      </div>
    </div>
  `;
}

// Render batches
function renderBatches() {
  const grid = document.getElementById('grid');
  const query = document.getElementById('searchInput').value.toLowerCase();
  
  if (loading) {
    grid.innerHTML = `
      <div class="loading-container">
        <div class="spinner"></div>
        <p>Loading batches...</p>
      </div>`;
    return;
  }
  
  if (batches.length === 0) {
    grid.innerHTML = `
      <div class="error-state">
        <h3>😕 No batches available</h3>
        <p>Unable to load courses. Please check your connection.</p>
        <button onclick="fetchBatches()">🔄 Retry</button>
      </div>`;
    return;
  }
  
  let filtered = [...batches];
  
  // Apply tab filter
  if (currentTab === 'enrolled') {
    filtered = filtered.filter(b => isEnrolled(b.id));
  }
  
  // Apply search
  if (query) {
    filtered = filtered.filter(b => 
      b.title.toLowerCase().includes(query)
    );
  }
  
  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <h3>No batches found</h3>
        <p>${currentTab === 'enrolled' ? 'You haven\'t enrolled in any courses yet.' : 'No courses match your search.'}</p>
      </div>`;
    return;
  }
  
  grid.innerHTML = filtered.map(createCard).join('');
}

// Update header statistics
function updateStats() {
  const stats = document.getElementById('headerStats');
  if (stats) {
    stats.textContent = `${batches.length} courses · ${enrolledIds.length} enrolled`;
  }
}

// Show toast notification
function showToast(message) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.remove();
  }, 3000);
}

// Fetch batches from API
async function fetchBatches() {
  loading = true;
  renderBatches();
  
  try {
    const response = await fetch("https://mtaiirwapi.lovable.app/api/batches");
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }
    
    const data = await response.json();
    
    // Handle different API response formats
    let rawBatches = [];
    if (Array.isArray(data)) {
      rawBatches = data;
    } else if (data.data && Array.isArray(data.data)) {
      rawBatches = data.data;
    } else if (data.batches && Array.isArray(data.batches)) {
      rawBatches = data.batches;
    }
    
    if (rawBatches.length === 0) {
      throw new Error('No batch data in response');
    }
    
    batches = rawBatches.map((b, index) => {
      const title = b.title || b.course_title || b.batch_title || b.courseName || b.batch_name || b.name || "Untitled Course";
      
      return {
        id: String(b.id || b._id || b.batch_id || index),
        title: title,
        thumbnail: b.thumbnail || b.course_thumbnail || b.image || b.thumb,
        description: b.description || b.desc || b.about || "Learn something new today!"
      };
    });
    
    showToast(`Loaded ${batches.length} courses successfully!`);
    
  } catch (error) {
    console.error("API Error:", error);
    
    const grid = document.getElementById('grid');
    grid.innerHTML = `
      <div class="error-state">
        <h3>⚠️ Connection Error</h3>
        <p>${error.message}</p>
        <button onclick="fetchBatches()">🔄 Retry</button>
      </div>`;
    
    showToast("Failed to load courses");
  } finally {
    loading = false;
    if (batches.length > 0) {
      renderBatches();
      updateStats();
      updateTabCounts();
    }
  }
}

// Initialize app
function init() {
  loadEnrolled();
  
  document.getElementById('searchInput').addEventListener('input', renderBatches);
  
  fetchBatches();
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
